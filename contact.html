// Target the specific span in the footer

footerUpdate.textContent = document.lastModified;

<script>
// 1. Set the event date (YYYY, MM-1, DD)
// Note: Months are 0-indexed (January is 0, May is 4)
const eventDate = new Date(2026, 10, 20);

const d =eventDate
const formatted = `
${d.toLocaleString('default', { weekday: 'long' })} ,
${d.toLocaleString('default', { month:'long'})},
${d.getDate()}, ${d.getFullYear()}`;


// 2. Get the current date and time
const currentDate = new Date();

// 3. Calculate the difference in milliseconds
const timeDifference = eventDate - currentDate;

// 4. Convert milliseconds to days (1000ms * 60s * 60m * 24h)
const daysRemaining = Math.ceil(timeDifference / (1000 * 60 * 60 * 24));

// 5. Display the output in the HTML element
const displayElement = document.getElementById("countdown-display");
if (daysRemaining > 0) {
    displayElement.innerHTML = `The sale ends ${formatted}
        <br> There are ${daysRemaining} days remaining until the end of the sale!`;
} else if (daysRemaining === 0) {
    displayElement.innerHTML = "The sale is today!";
} else {
    displayElement.innerHTML = "The sale has ended.";
}
</script>
